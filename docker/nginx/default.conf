server {
    # 80번 포트로 들어오는 요청을 대기함
    listen 80;
    
    # 로컬 hosts 파일에 등록한 도메인을 지정함
    server_name tipmarket.com;

    # Laravel의 웹 진입점은 public 디렉터리임
    root /var/www/html/public;
    index index.php index.html;

    # 라라벨의 고유 라우팅 설정임
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 업로드 요청 크기 제한 상향 (summernote/post 이미지 업로드용)
    client_max_body_size 12m;

    # PHP 파일 처리 (프로젝트 고유 컨테이너명으로 연결함)
    location ~ \.php$ {
        # 공유 proxy-nw에 다른 서비스의 app alias가 있을 수 있으므로 고유 이름을 사용함
        fastcgi_pass tipmarket-php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        
        # PHP-FPM에 전달할 실제 파일 경로임
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # 로그 기록 설정임
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
