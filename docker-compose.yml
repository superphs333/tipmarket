services:
  # 새 시작점: 프록시가 연결할 최소 정적 웹 서버임
  web:
    image: nginx:1.24-alpine
    container_name: tipmarket-web
    restart: unless-stopped
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy-nw

networks:
  proxy-nw:
    external: true
